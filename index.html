<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --red: #800000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; background: #050505; color: #fff; font-family: sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            user-select: none;
        }

        /* Анимация отскока */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.2s ease-in-out; }

        .container { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .glass-card { background: var(--glass); border: var(--border); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; }

        .title { 
            font-weight: 900; font-size: 22px; text-transform: uppercase; margin: 0 0 15px 0;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }

        .video-btn {
            display: block; padding: 12px; border: 2px solid var(--red); border-radius: 12px;
            background: rgba(128, 0, 0, 0.3); color: #ff4d4d; font-weight: 900; text-decoration: none; text-transform: uppercase;
        }

        .nav-title { 
            text-align: center; font-size: 16px; margin: 0 0 15px 0; text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000;
        }

        /* Исправленная сетка */
        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
        }
        
        .btn { 
            padding: 12px; border-radius: 14px; border: var(--border); 
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 900; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .btn img { 
            width: 24px; height: 24px; border-radius: 6px; 
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.7)); 
        }

        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="home" class="screen active container">
        <div class="glass-card">
            <h1 class="title">ВОРК ПАНЕЛЬ</h1>
            <a href="#" class="video-btn" onclick="handle(event, 'home')">ВИДЕО ОБУЧЕНИЕ</a>
        </div>

        <h3 class="nav-title">НАВИГАЦИЯ</h3>
        
        <div class="grid">
            <button class="btn" onclick="handle(event, 'profile')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПРОФИЛЬ</button>
            <button class="btn" onclick="handle(event, 'mentors')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> НАСТАВНИК</button>
            <button class="btn" onclick="handle(event, 'manuals')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> МАНУАЛ</button>
            <button class="btn" onclick="handle(event, 'packs')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПАКИ</button>
        </div>
    </div>

    <script>
        function handle(event, id) {
            const el = event.currentTarget;
            el.classList.add('animate-pop');
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                el.classList.remove('animate-pop');
            }, 200);
        }
    </script>
</body>
</html>
