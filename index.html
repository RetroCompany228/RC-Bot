<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ворк-Панель</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap');
        
        /* Глобальные стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #020000;
            color: #fff;
        }

        /* Анимированный фон */
        body::before {
            content: "";
            position: absolute;
            inset: -300px;
            background: radial-gradient(circle at 20% 20%, rgba(255, 0, 60, .25), transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(120, 0, 20, .45), transparent 55%),
                        radial-gradient(circle at 50% 80%, rgba(255, 0, 0, .12), transparent 60%);
            filter: blur(90px);
            animation: bg 18s ease-in-out infinite alternate;
        }

        @keyframes bg {
            to { transform: translate(140px, 100px) scale(1.15); }
        }

        /* Частицы */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Основная панель */
        .app {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 460px;
            height: 92vh;
            border-radius: 36px;
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 80, 80, .15);
            box-shadow: 0 40px 120px rgba(0, 0, 0, .85), inset 0 0 80px rgba(255, 0, 0, .08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Разделительная линия */
        .divider {
            width: 90%;
            height: 1px;
            background: rgba(255, 80, 80, 0.2);
            margin: 6px auto;
            flex-shrink: 0;
        }

        /* Оформление контента */
        #mentor-page {
            padding: 20px;
            height: 100%;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Рамки для наставников */
        .mentor-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1; /* Растягивается */
        }

        .mentor-content {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: auto;
        }

        .mentor-img {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .mentor-info-name {
            font-weight: 900;
            font-size: 16px;
        }

        .mentor-info-desc {
            font-size: 13px;
            color: #ff2b3d;
            margin-top: 4px;
        }

        .inner-divider {
            height: 1px;
            background: rgba(255, 80, 80, 0.3);
            margin: 15px 0;
        }

        /* Полукруглая кнопка */
        .write-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.4);
            color: #fff;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .write-btn:hover {
            background: rgba(255, 80, 80, 0.2);
        }

        /* Кнопка Назад */
        .back-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #fff;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            margin-top: auto;
        }

    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="app">
        <div id="main-view" style="display: flex; flex-direction: column; height: 100%; padding: 20px;">
            <div style="font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 20px;">ГЛАВНАЯ</div>
            <button onclick="openMentor()" style="padding: 20px; border-radius: 20px; background: #222; color: #fff; border: none; font-weight: 900; cursor: pointer;">ОТКРЫТЬ НАСТАВНИКОВ</button>
        </div>

        <div id="mentor-page">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 22px; font-weight: 900; color: #fff;">РАЗДЕЛ <span style="color:#ff2b3d;">НАСТАВНИК</span></div>
            </div>

            <div class="mentor-card">
                <div class="mentor-content">
                    <img src="https://i.postimg.cc/tgvgrKPF/file-00000000e62471f4abcd57f082e86de9.png" class="mentor-img">
                    <div>
                        <div class="mentor-info-name">Наставник №1 - Kodi</div>
                        <div class="mentor-info-desc">Направление: Шантаж - Универсал</div>
                    </div>
                </div>
                
                <div class="inner-divider"></div>
                
                <button onclick="window.open('https://t.me/bicuze')" class="write-btn">Написать Kodi</button>
            </div>

            <div class="mentor-card">
                <div class="mentor-content">
                    <img src="https://i.postimg.cc/sxxgCsdC/file-00000000b860720aa3ee358794aca807.png" class="mentor-img">
                    <div>
                        <div class="mentor-info-name">Наставник №2 - Relax</div>
                        <div class="mentor-info-desc">Направление: Шантаж - Универсал</div>
                    </div>
                </div>
                
                <div class="inner-divider"></div>
                
                <button onclick="window.open('https://t.me/coxiko')" class="write-btn">Написать Relax</button>
            </div>
            
            <button class="back-btn" onclick="closeMentor()">← Назад</button>
        </div>
    </div>

    <script>
        function openMentor() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('mentor-page').style.display = 'flex';
        }

        function closeMentor() {
            document.getElementById('mentor-page').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        /* Логика частиц (фон) */
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = Array.from({ length: 100 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 2 + 0.5,
            color: ["#ff003c", "#fff", "#000"][Math.floor(Math.random() * 3)]
        }));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height) p.y = 0;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
