<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ворк-Панель</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050000;
color:#fff;
}

/* 🔥 DARK RED PREMIUM BACKGROUND */
body::before{
content:"";
position:absolute;
inset:-200px;
background:
radial-gradient(circle at 20% 20%, rgba(255,30,60,.28), transparent 45%),
radial-gradient(circle at 70% 30%, rgba(120,0,0,.25), transparent 50%),
radial-gradient(circle at 50% 80%, rgba(255,0,0,.12), transparent 60%);
filter:blur(80px);
animation:bg 16s ease-in-out infinite alternate;
}

@keyframes bg{
to{transform:translate(120px,90px) scale(1.1);}
}

/* 📱 APP */
.app{
width:95%;
max-width:460px;
height:92vh;
border-radius:34px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(28px);

border:1px solid rgba(255,255,255,.10);
box-shadow:0 30px 90px rgba(0,0,0,.75);

display:flex;
flex-direction:column;
overflow:hidden;
}

/* 🖼 TOP IMAGE FRAME (NEW PREMIUM BORDER) */
.top-wrap{
padding:14px;
}

.top-frame{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

padding:10px;
border-radius:22px;

background:rgba(255,255,255,.05);
border:1px solid rgba(255,60,80,.25);
box-shadow:0 0 30px rgba(255,0,0,.08);
}

.top-frame img{
width:100%;
height:120px;
object-fit:cover;
border-radius:16px;
transition:.25s;
}

.top-frame img:hover{
transform:scale(1.02);
filter:brightness(1.1);
}

/* 🧊 TITLE */
.title-box{
margin:0 14px;
padding:16px;
border-radius:24px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.10);
}

.title{
font-size:22px;
font-weight:900;
letter-spacing:2px;
}

.title span{
color:#ff2b3d;
}

.desc{
margin-top:8px;
font-size:12px;
line-height:1.5;
color:rgba(255,255,255,.70);
}

/* 🧭 NAV */
.tabs{
margin:12px 14px;
display:flex;
gap:6px;
padding:4px;

background:rgba(255,255,255,.05);
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:12px;
font-size:12px;
font-weight:600;
color:rgba(255,255,255,.6);
cursor:pointer;
transition:.2s;
}

.tab.active{
background:rgba(255,255,255,.12);
color:#fff;
}

/* 📄 PAGE */
.page{
flex:1;
padding:14px;
display:none;
}

.page.active{
display:block;
}

/* 🔘 BUTTONS */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
padding:15px;
border-radius:18px;

background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.10);

color:#fff;
font-size:12px;
font-weight:700;

cursor:pointer;
transition:.2s;

-webkit-tap-highlight-color:transparent;
outline:none;
}

.btn:active{
transform:scale(.96);
}

.btn:hover{
border-color:rgba(255,40,60,.35);
background:rgba(255,255,255,.09);
}

/* 🧾 FOOTER */
.footer{
text-align:center;
padding:12px;
font-size:11px;
color:rgba(255,255,255,.45);
border-top:1px solid rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<div class="top-wrap">
<div class="top-frame">
<img src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
<img src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
</div>
</div>

<!-- TITLE -->
<div class="title-box">
<div class="title">ВОРК - <span>ПАНЕЛЬ</span></div>
<div class="desc">
Новичок? Не знаешь с чего начать?  
Специально для тебя и нашей команды — мы сделали собственного бота!
</div>
</div>

<!-- NAV -->
<div class="tabs">
<div class="tab active" onclick="go(0)">МЕНЮ</div>
<div class="tab" onclick="go(1)">ИНФО</div>
</div>

<!-- PAGE 1 -->
<div class="page active">
<div class="grid">
<button class="btn">ПРОФИЛЬ</button>
<button class="btn">НАСТАВНИК</button>
<button class="btn">МАНУАЛ</button>
<button class="btn">ПАКИ</button>
<button class="btn">ГОЛОСОВЫЕ</button>
<button class="btn">ПАСТЫ</button>
<button class="btn">БОТЫ</button>
<button class="btn">ПРОБИВ</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div style="font-size:12px;line-height:1.6;color:rgba(255,255,255,.65);padding:4px">
Система: Premium Glass UI<br>
Версия: v6.1 Final Red Build<br><br>
Интерфейс полностью адаптирован под быстрый доступ к инструментам команды.<br><br>
Статус: стабильный ✔
</div>
</div>

<!-- FOOTER -->
<div class="footer">CYBER GLASS SYSTEM</div>

</div>

<script>
const tabs=document.querySelectorAll(".tab");
const pages=document.querySelectorAll(".page");

function go(i){
tabs.forEach(t=>t.classList.remove("active"));
pages.forEach(p=>p.classList.remove("active"));

tabs[i].classList.add("active");
pages[i].classList.add("active");
}
</script>

</body>
</html>
