<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Retro Company</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
outline:none;
font-family:Inter,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#050505;

overflow:hidden;

color:white;

height:100vh;

}

/* ---------- ФОН ---------- */

.bg{

position:fixed;

width:100%;

height:100%;

z-index:-5;

overflow:hidden;

}

.glow{

position:absolute;

border-radius:50%;

filter:blur(130px);

animation:float 12s infinite alternate ease-in-out;

}

.red1{

width:340px;

height:340px;

background:#9f0000;

top:-120px;

left:-90px;

}

.red2{

width:300px;

height:300px;

background:#350000;

right:-100px;

bottom:-100px;

animation-delay:2s;

}

.red3{

width:220px;

height:220px;

background:#550000;

left:40%;

top:45%;

opacity:.4;

animation-delay:5s;

}

@keyframes float{

0%{

transform:translate(0,0) scale(1);

}

100%{

transform:translate(50px,-40px) scale(1.15);

}

}

/* ---------- ЗАГРУЗКА ---------- */

.loader{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#050505;

display:flex;

align-items:center;

justify-content:center;

z-index:99999;

transition:.4s;

}

.spinner{

width:60px;

height:60px;

border-radius:50%;

border:4px solid rgba(255,255,255,.08);

border-top:4px solid #d10000;

animation:spin .8s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

/* ---------- КОНТЕЙНЕР ---------- */

.container{

max-width:430px;

height:100vh;

margin:auto;

padding:18px;

overflow-y:auto;

scrollbar-width:none;

}

.container::-webkit-scrollbar{

display:none;

}

/* ---------- ЭКРАНЫ ---------- */

.screen{

display:none;

animation:fade .35s ease;

padding-bottom:30px;

}

.screen.active{

display:block;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* ---------- КАРТОЧКИ ---------- */

.card{

background:rgba(255,255,255,.04);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:18px;

margin-bottom:16px;

box-shadow:0 10px 30px rgba(0,0,0,.45);

}

/* ---------- БАННЕР ---------- */

.banner{

width:100%;

display:block;

border-radius:24px;

border:1px solid rgba(255,255,255,.08);

margin-bottom:18px;

}

/* ---------- ЗАГОЛОВКИ ---------- */

.title{

font-family:"Cinzel",serif;

font-size:24px;

letter-spacing:3px;

text-align:center;

margin-bottom:18px;

text-shadow:

0 0 10px rgba(255,0,0,.45);

}

/* ---------- КНОПКИ ---------- */

.navButton{

width:100%;

display:flex;

align-items:center;

justify-content:space-between;

padding:18px;

margin-bottom:12px;

border:none;

border-radius:18px;

cursor:pointer;

background:

linear-gradient(

180deg,

rgba(255,255,255,.07),

rgba(255,255,255,.03)

);

border:1px solid rgba(255,255,255,.08);

color:white;

transition:.18s;

}

.navButton:active{

transform:scale(.97);

background:

linear-gradient(

180deg,

rgba(180,0,0,.35),

rgba(80,0,0,.25)

);

}

.left{

display:flex;

align-items:center;

gap:15px;

}

.icon{

width:52px;

height:52px;

border-radius:16px;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

background:

linear-gradient(180deg,#980000,#520000);

box-shadow:

0 0 20px rgba(255,0,0,.18);

}

.text h3{

font-size:16px;

font-weight:700;

}

.text p{

font-size:12px;

opacity:.6;

margin-top:3px;

}

.arrow{

font-size:20px;

opacity:.55;

}
