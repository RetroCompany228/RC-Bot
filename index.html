<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal</title>
    <style>
        :root {
            --bg-dark: #050505;
            --red-btn: #800000;
            --glass: rgba(255, 255, 255, 0.04);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --red-glow: 0 0 15px rgba(179, 0, 0, 0.8);
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at 50% 0%, #3a0000 0%, transparent 60%),
                        radial-gradient(circle at 50% 100%, #3a0000 0%, transparent 60%),
                        radial-gradient(circle at 50% 50%, #1a0000 0%, #050505 70%);
            background-color: #050505;
            background-attachment: fixed;
            color: #fff; font-family: sans-serif; height: 100vh; 
            overflow-y: auto; touch-action: manipulation;
        }
        
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: var(--border); border-radius: 24px; padding: 20px; margin: 15px; }
        
        /* Стили для кнопки "Видео обучение" */
        .video-btn {
            display: block;
            margin: 15px auto 0;
            padding: 12px 20px;
            border: 1px solid #800000;
            border-radius: 12px;
            background: rgba(128, 0, 0, 0.2);
            color: #ff4d4d;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-align: center;
        }
        .video-btn:active { background: #800000; color: #fff; transform: scale(0.95); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 15px; }
        
        .btn { 
            padding: 12px 10px; border-radius: 16px; border: var(--border); 
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 700; 
            cursor: pointer; transition: transform 0.1s ease-out;
            display: flex; align-items: center; gap: 10px;
            user-select: none;
        }
        .btn:active { transform: scale(0.90); background: var(--red-btn); }
        
        .btn img { 
            width: 28px; height: 28px; object-fit: cover; 
            border-radius: 8px; border: 2px solid #000; 
            filter: drop-shadow(0 0 4px rgba(255, 0, 0, 0.5)); 
        }

        .title { font-weight: 900; font-size: 28px; letter-spacing: 3px; text-transform: uppercase; margin: 0; text-shadow: var(--red-glow); }
        .nav-title { text-align: center; color: #fff; margin: 20px 0; letter-spacing: 2px; text-shadow: var(--red-glow); }
        
        .photo-container { display: flex; justify-content: space-between; gap: 10px; margin: 15px; }
        .photo { width: 48%; height: 120px; object-fit: cover; border-radius: 16px; border: 2px solid #000; display: block; }
        
        .screen { display: none; }
        .screen.active { display: block; }
        .support-link { color: rgba(255,255,255,0.2); font-size: 13px; text-decoration: underline; display: block; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="photo-container">
            <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
            <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
        </div>

        <div class="glass-card" style="text-align: center;">
            <h1 class="title">ВОРК ПАНЕЛЬ</h1>
            <p style="opacity: 0.7; font-size: 15px; margin: 15px 0; font-weight: 600;">
                Новичок ?<br>Не знаешь с чего Начать ?
            </p>
            <a href="https://t.me/RetroWork_Bot" class="video-btn">ВИДЕО ОБУЧЕНИЕ</a>
        </div>

        <h3 class="nav-title">НАВИГАЦИЯ</h3>
        
        <div class="grid">
            <button class="btn" onclick="loadScreen('profile')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПРОФИЛЬ</button>
            <button class="btn" onclick="loadScreen('mentors')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> НАСТАВНИК</button>
            <button class="btn" onclick="loadScreen('manuals')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> МАНУАЛ</button>
            <button class="btn" onclick="loadScreen('packs')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПАКИ</button>
            <button class="btn" onclick="loadScreen('voice')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ГОЛОСОВЫЕ</button>
            <button class="btn" onclick="loadScreen('pastes')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПАСТЫ</button>
            <button class="btn" onclick="loadScreen('bots')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> БОТЫ</button>
            <button class="btn" onclick="loadScreen('dox')"><img src="https://i.postimg.cc/1Rq1pKbZ/file-00000000817c71f4a7454602d4aff41f.png"> ПРОБИВ</button>
        </div>

        <a href="http://t.me/send?start=IVP6IT4GmUuc" class="support-link">Поддержать Команду</a>
    </div>

    <section id="profile" class="screen"><div class="glass-card"><h2>ПРОФИЛЬ</h2><button class="btn" onclick="loadScreen('home')">НАЗАД</button></div></section>
    
    <script>
        function loadScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }
    </script>
</body>
</html>
