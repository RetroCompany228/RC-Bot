@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;outline:none;}

body{background:#050505;color:#fff;min-height:100vh;overflow-x:hidden;}

/* Прелоадер */
#loader{
    position:fixed;top:0;left:0;width:100%;height:100%;background:#050505;
    z-index:9999;display:flex;justify-content:center;align-items:center;
    transition:opacity 0.3s;
}
.spinner{
    width:40px;height:40px;border:4px solid rgba(255,0,0,0.2);
    border-top:4px solid #b30000;border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.bg-glow{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(120px);z-index:-1;opacity:0.4}
.bg1{background:#8b0000;top:-100px;left:-100px}
.bg2{background:#2b0000;bottom:-120px;right:-120px}

.container{max-width:430px;margin:auto;padding:20px;}
.screen{display:none;animation:fadeIn 0.5s ease}
.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.banner{width:100%;border-radius:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
.title-font{font-family:'Orbitron',sans-serif;letter-spacing:2px;margin-bottom:15px;color:#fff;text-transform:uppercase}

.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;margin-bottom:20px;}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{
    display:block;width:100%;padding:15px;border:none;border-radius:14px;
    color:white;font-weight:700;cursor:pointer;text-align:center;
    background:linear-gradient(90deg,#b30000,#5a0000);
    transition:transform 0.2s, background 0.2s;
}
.btn:active{transform:scale(0.95)}
.btn-outline{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)}

/* Профиль Наставника */
.mentor-img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:10px;border:2px solid #b30000}
</style>
</head>

<script>
    // Скрытие прелоадера при загрузке страницы
    window.onload = () => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 300);
    };

    function loadScreen(id) {
        // Показываем прелоадер
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        loader.style.opacity = '1';

        // Имитация загрузки контента
        setTimeout(() => {
            document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Скрываем прелоадер
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 300);
        }, 1000); // Задержка 1 секунда
    }

    // Инициализация Telegram WebApp
    if (window.Telegram?.WebApp) {
        Telegram.WebApp.expand();
        const u = Telegram.WebApp.initDataUnsafe?.user;
        if (u) {
            document.getElementById("name").innerText = (u.first_name || "") + " " + (u.last_name || "");
            document.getElementById("user").innerText = "@" + (u.username || "user");
        }
    }
</script>
