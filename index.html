<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berserk Eclipse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            background: linear-gradient(180deg, #000 0%, #4a0000 100%);
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid #8b0000;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
        }
        h1 { color: #ff3333; text-shadow: 0 0 10px #8b0000; margin-bottom: 20px; }
        
        .btn {
            background: rgba(139, 0, 0, 0.3);
            border: 1px solid #ff4444;
            color: white;
            padding: 15px 30px;
            margin: 10px 0;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            font-size: 16px;
            width: 100%;
            outline: none !important;
            display: block;
        }
        .btn:active {
            transform: scale(0.95);
            background: #8b0000;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>RETRO COMPANY</h1>
        <button class="btn" onclick="Telegram.WebApp.showAlert('Гатс идет вперед...')">ГАТС</button>
        <button class="btn" onclick="Telegram.WebApp.showAlert('Гриффит выбирает путь...')">ГРИФФИТ</button>
        <button class="btn" onclick="Telegram.WebApp.close()" style="border-color: #555;">ЗАКРЫТЬ</button>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
