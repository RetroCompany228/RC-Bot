<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Panel v7 iOS Mode</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Arial}

body{
height:100vh;
overflow:hidden;
background:#000;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* iOS background */
body::before{
content:"";
position:absolute;
inset:-200px;
background:
radial-gradient(circle at 20% 20%,rgba(255,80,120,.25),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(120,80,255,.22),transparent 45%),
radial-gradient(circle at 50% 80%,rgba(255,0,80,.15),transparent 50%);
filter:blur(60px);
animation:bg 18s infinite alternate ease-in-out;
}

@keyframes bg{
to{transform:translate(120px,80px) scale(1.1);}
}

/* PHONE FRAME */
.phone{
width:100%;
max-width:420px;
height:92vh;
border-radius:38px;
overflow:hidden;
position:relative;
background:rgba(20,20,20,.35);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 40px 100px rgba(0,0,0,.7);
}

/* HOME SCREEN */
.home{
padding:18px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
padding-top:60px;
}

/* APP ICON */
.app{
width:100%;
aspect-ratio:1/1;
border-radius:18px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.1);
}

.app:active{
transform:scale(.92);
}

.dot{
width:32px;
height:32px;
border-radius:10px;
background:linear-gradient(135deg,#ff3b5c,#7a5cff);
margin-bottom:6px;
}

/* DOCK */
.dock{
position:absolute;
bottom:12px;
left:10px;
right:10px;
height:70px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-radius:24px;
display:flex;
justify-content:space-around;
align-items:center;
border:1px solid rgba(255,255,255,.08);
}

.dock .app{
width:52px;
height:52px;
border-radius:14px;
}

/* OPEN APP SCREEN */
.screen{
position:absolute;
inset:0;
background:rgba(10,10,10,.95);
backdrop-filter:blur(30px);
transform:translateY(100%);
transition:.35s ease;
display:flex;
flex-direction:column;
padding:18px;
}

.screen.active{
transform:translateY(0);
}

/* top bar */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.back{
font-size:12px;
color:#ff3b5c;
cursor:pointer;
}

/* grid inside app */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.btn{
padding:14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.06);
color:#fff;
font-size:11px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.btn:active{transform:scale(.96)}

.title{
font-size:18px;
font-weight:800;
}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div class="home" id="home">

<div class="app" onclick="openApp()">
<div class="dot"></div>Профиль
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Наставник
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Мануал
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Паки
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Голоса
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Пасты
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Боты
</div>

<div class="app" onclick="openApp()">
<div class="dot"></div>Пробив
</div>

</div>

<!-- DOCK -->
<div class="dock">
<div class="app" onclick="openApp()"><div class="dot"></div></div>
<div class="app" onclick="openApp()"><div class="dot"></div></div>
<div class="app" onclick="openApp()"><div class="dot"></div></div>
<div class="app" onclick="openApp()"><div class="dot"></div></div>
</div>

<!-- APP SCREEN -->
<div class="screen" id="screen">

<div class="topbar">
<div class="back" onclick="closeApp()">‹ Назад</div>
<div class="title">WORK PANEL</div>
<div></div>
</div>

<div class="grid">
<button class="btn">ПРОФИЛЬ</button>
<button class="btn">НАСТАВНИК</button>
<button class="btn">МАНУАЛ</button>
<button class="btn">ПАКИ</button>
<button class="btn">ГОЛОСОВЫЕ</button>
<button class="btn">ПАСТЫ</button>
<button class="btn">БОТЫ</button>
<button class="btn">ПРОБИВ</button>
</div>

</div>

</div>

<script>
function openApp(){
document.getElementById("screen").classList.add("active");
}

function closeApp(){
document.getElementById("screen").classList.remove("active");
}

/* small haptic feel */
document.querySelectorAll(".app, .btn").forEach(el=>{
el.addEventListener("click",()=>{
el.animate(
[{transform:"scale(.95)"},{transform:"scale(1)"}],
{duration:120}
);
});
});
</script>

</body>
</html>
