    <script>
        /* Инициализация навигации и логики */
        const tg = window.Telegram.WebApp;
        
        // Расширение приложения на весь экран
        tg.expand();

        // Управление разделами
        const nav = {
            loaded: new Set(['home']),
            to(id) {
                // Плавное переключение
                document.querySelectorAll('.section').forEach(s => {
                    s.classList.remove('active');
                    s.style.display = 'none';
                });
                
                const target = document.getElementById(id);
                
                // Эффект загрузки при первом посещении
                if (!this.loaded.has(id)) {
                    document.getElementById('loader').style.display = 'flex';
                    document.getElementById('loader').style.opacity = '1';
                    
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            target.style.display = 'block';
                            setTimeout(() => target.classList.add('active'), 50);
                            this.loaded.add(id);
                        }, 300);
                    }, 1000);
                } else {
                    target.style.display = 'block';
                    setTimeout(() => target.classList.add('active'), 50);
                }
            }
        };

        // Инициализация данных при загрузке
        window.addEventListener('load', () => {
            const user = tg.initDataUnsafe.user;
            if (user) {
                document.getElementById('user-display-name').innerText = `${user.first_name} ${user.last_name || ''}`;
                document.getElementById('user-handle').innerText = `@${user.username || user.id}`;
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }

            // Плавное скрытие лоадера
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
            }, 1200);
        });

        /* Дополнительная логика обработки касаний для премиального UX */
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.borderColor = 'var(--accent)';
            });
            card.addEventListener('touchend', function() {
                this.style.borderColor = 'var(--border)';
            });
        });
    </script>
