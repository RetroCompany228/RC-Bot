<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            /* Приглушенный, мягкий красный цвет */
            --soft-red: rgba(180, 0, 0, 0.4);
            --bg-dark: #050505;
        }

        body { 
            margin: 0; padding: 0;
            background: #050505;
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Статичная мягкая рамка */
        .page-frame {
            width: 92%; max-width: 400px; height: 95vh;
            border: 1.5px solid var(--soft-red);
            border-radius: 25px;
            padding: 15px; 
            box-sizing: border-box;
            display: flex; flex-direction: column; 
            gap: 12px;
            background: radial-gradient(circle at 50% 50%, #100505 0%, #050505 100%);
        }

        .photo-container { display: flex; gap: 8px; }
        .photo { flex: 1; height: 65px; object-fit: cover; border-radius: 10px; border: 1px solid var(--soft-red); }

        .header-box { 
            border: 1px solid var(--soft-red); border-radius: 18px; padding: 12px; 
            text-align: center; background: rgba(50, 0, 0, 0.2);
        }
        .title { text-transform: uppercase; font-weight: 800; font-size: 18px; margin: 0 0 8px 0; color: #ff3333; }
        .desc { color: #aaa; font-size: 11px; line-height: 1.3; margin: 0; }

        .nav-wrapper { border: 1px solid var(--soft-red); border-radius: 18px; padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .nav-title { text-align: center; font-size: 12px; color: #fff; margin-bottom: 8px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn { 
            padding: 10px; border-radius: 8px; border: 1px solid var(--soft-red);
            background: rgba(180, 0, 0, 0.1); color: #ddd; font-weight: 600; font-size: 10px;
            cursor: pointer; text-transform: uppercase;
        }

        .support-link { color: #666; font-size: 10px; text-align: center; margin-top: auto; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="page-frame">
        <div class="photo-container">
            <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
            <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
        </div>

        <div class="header-box">
            <h1 class="title">ВОРК ПАНЕЛЬ</h1>
            <p class="desc">Новичок?<br>Не знаешь с чего начать?<br>Специально для тебя - Мы сделали Собственного Бота!</p>
        </div>

        <div class="nav-wrapper">
            <h3 class="nav-title">НАВИГАЦИЯ</h3>
            <div class="grid">
                <button class="btn">ПРОФИЛЬ</button>
                <button class="btn">НАСТАВНИК</button>
                <button class="btn">МАНУАЛ</button>
                <button class="btn">ПАКИ</button>
                <button class="btn">ГОЛОСОВЫЕ</button>
                <button class="btn">ПАСТЫ</button>
                <button class="btn">БОТЫ</button>
                <button class="btn">ПРОБИВ</button>
            </div>
        </div>

        <div class="support-link">Поддержать Команду</div>
    </div>

</body>
</html>
