<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --red: #ff0000;
            --neon: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        body { 
            margin: 0; padding: 0;
            background: #050505;
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden; /* Запрет прокрутки */
            display: flex; align-items: center; justify-content: center;
        }

        /* Статичная красная неоновая рамка */
        .page-frame {
            width: 95%; max-width: 450px; height: 95vh;
            border: 2px solid var(--red);
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: var(--neon);
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(10, 0, 0, 0.5);
        }

        .photo-container { display: flex; justify-content: space-between; gap: 10px; }
        .photo { width: 48%; height: 80px; object-fit: cover; border-radius: 10px; border: 1px solid var(--red); box-shadow: 0 0 5px var(--red); }

        .header-box { 
            border: 1px solid var(--red); border-radius: 20px; padding: 15px; 
            text-align: center; box-shadow: 0 0 10px rgba(255,0,0,0.2);
        }
        .title { text-transform: uppercase; letter-spacing: 3px; font-weight: 900; font-size: 20px; margin: 0 0 10px 0; text-shadow: 0 0 10px var(--red); }
        .desc { color: #ccc; font-size: 12px; line-height: 1.4; margin: 0; }

        .nav-wrapper { border: 1px solid var(--red); border-radius: 20px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .nav-title { text-align: center; font-size: 13px; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { 
            padding: 12px; border-radius: 10px; border: 1px solid var(--red);
            background: rgba(255,0,0,0.1); color: #fff; font-weight: 700; font-size: 11px;
            cursor: pointer; text-transform: uppercase;
        }

        .support-link { color: #888; font-size: 11px; text-align: center; margin-top: auto; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="page-frame">
        <div class="photo-container">
            <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
            <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
        </div>

        <div class="header-box">
            <h1 class="title">ВОРК ПАНЕЛЬ</h1>
            <p class="desc">Новичок?<br>Не знаешь с чего начать?<br>Специально для тебя - Мы сделали Собственного Бота!</p>
        </div>

        <div class="nav-wrapper">
            <h3 class="nav-title">НАВИГАЦИЯ</h3>
            <div class="grid">
                <button class="btn">ПРОФИЛЬ</button>
                <button class="btn">НАСТАВНИК</button>
                <button class="btn">МАНУАЛ</button>
                <button class="btn">ПАКИ</button>
                <button class="btn">ГОЛОСОВЫЕ</button>
                <button class="btn">ПАСТЫ</button>
                <button class="btn">БОТЫ</button>
                <button class="btn">ПРОБИВ</button>
            </div>
        </div>

        <a href="#" class="support-link">Поддержать Команду</a>
    </div>

</body>
</html>
