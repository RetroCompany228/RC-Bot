<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Контейнер для изображений (как на скриншотах) */
        .header-images {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .header-images img {
            width: 45%;
            border-radius: 10px;
        }

        /* Главная панель */
        .main-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        /* Заголовки */
        h1, h2 {
            text-transform: uppercase;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        /* Сетка для навигации */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        /* Кнопки навигации */
        .nav-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Кнопка "Видео обучение" */
        .video-btn {
            display: block;
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ff0000;
            color: #ff0000;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="header-images">
        <img src="URL_ТВОЕЙ_КАРТИНКИ_1" alt="Retro">
        <img src="URL_ТВОЕЙ_КАРТИНКИ_2" alt="Company">
    </div>

    <div class="main-panel">
        <h1>ПАНЕЛЬ</h1>
        <p>Не знаешь с чего начать?</p>
        <a href="#" class="video-btn">ВИДЕО ОБУЧЕНИЕ</a>
    </div>

    <h2>НАВИГАЦИЯ</h2>

    <div class="nav-grid">
        <button class="nav-btn">ПРОФИЛЬ</button>
        <button class="nav-btn">НАСТАВНИК</button>
        <button class="nav-btn">МАНУАЛ</button>
        <button class="nav-btn">ПАКИ</button>
        <button class="nav-btn">ГОЛОСОВЫЕ</button>
        <button class="nav-btn">ПАСТЫ</button>
        <button class="nav-btn">БОТЫ</button>
        <button class="nav-btn">ПРОБИВ</button>
    </div>

</body>
</html>
