<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --card-bg: rgba(25, 25, 25, 0.6); }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .profile-header { 
            width: 100%; max-width: 400px; background: var(--card-bg); 
            border: 1px solid var(--red); border-radius: 20px; padding: 20px;
            text-align: center; margin-bottom: 30px; box-shadow: 0 0 20px rgba(255,0,0,0.15);
        }

        .mentor-card {
            width: 100%; max-width: 400px; background: var(--card-bg);
            border: 1px solid #333; border-radius: 20px; padding: 15px;
            margin-bottom: 20px; display: flex; align-items: center;
            transition: 0.4s; border-left: 4px solid var(--red);
        }

        .mentor-card img {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--red); object-fit: cover; margin-right: 15px;
        }

        .btn {
            display: inline-block; padding: 10px 20px; margin-top: 10px;
            background: transparent; border: 1px solid var(--red); color: var(--red);
            border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }

        .btn:active { background: var(--red); color: #fff; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="profile-header">
        <h2 id="user-name">Загрузка...</h2>
        <p style="color: #888;">Статус: Воркер Retro Company</p>
    </div>

    <div class="mentor-card">
        <img src="https://i.postimg.cc/4d7VpZjx/file-00000000e62471f4abcd57f082e86de9.png">
        <div>
            <h3 style="margin:0;">Kodi</h3>
            <p style="font-size: 12px; color: #aaa; margin: 5px 0;">Наставник №1</p>
            <a href="https://t.me/bicuze" class="btn">НАПИСАТЬ</a>
        </div>
    </div>

    <div class="mentor-card">
        <img src="https://i.postimg.cc/NGXRMs1S/file-00000000b860720aa3ee358794aca807.png">
        <div>
            <h3 style="margin:0;">Relax</h3>
            <p style="font-size: 12px; color: #aaa; margin: 5px 0;">Наставник №2</p>
            <a href="https://t.me/coxiko" class="btn">НАПИСАТЬ</a>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = "Привет, " + tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
