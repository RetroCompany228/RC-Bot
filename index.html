<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --bg-dark: #050505;
            --red: #ff0000;
        }

        body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 50%, #080505 0%, #050505 70%);
            background-color: #050505;
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* --- ИДЕАЛЬНО СИММЕТРИЧНЫЕ ШТОРКИ --- */
        .curtain {
            position: fixed; top: 0; bottom: 0; width: 50%;
            background: #050505; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        
        /* Линия разделителя */
        .curtain-left { left: 0; border-right: 1px solid rgba(255, 0, 0, 0.3); }
        .curtain-right { right: 0; border-left: 1px solid rgba(255, 0, 0, 0.3); }
        
        .curtain-text {
            font-size: 18px; font-weight: 900; color: var(--red);
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--red);
        }

        .curtain-left.open { transform: translateX(-100%); }
        .curtain-right.open { transform: translateX(100%); }

        /* Контент (для проверки) */
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
    </style>
</head>
<body>

    <div class="curtain curtain-left" id="cLeft"><span class="curtain-text">ДОБРО</span></div>
    <div class="curtain curtain-right" id="cRight"><span class="curtain-text">ПОЖАЛОВАТЬ</span></div>

    <div class="container">
        <h1>ТВОЙ КОНТЕНТ</h1>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('cLeft').classList.add('open');
                document.getElementById('cRight').classList.add('open');
            }, 2000); 
        };
    </script>
</body>
</html>
