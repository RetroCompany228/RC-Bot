<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Panel v5 Ultra</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
height:100vh;
overflow:hidden;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* BACKGROUND */
body::before{
content:"";
position:absolute;
width:900px;height:900px;
background:radial-gradient(circle,rgba(255,0,0,.16),transparent 60%);
top:-350px;left:-350px;
filter:blur(80px);
animation:bg 14s infinite alternate ease-in-out;
}

@keyframes bg{
to{transform:translate(320px,260px) scale(1.2);}
}

/* BOOT SCREEN */
.boot{
position:absolute;
inset:0;
background:#050505;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
animation:bootOut 2.2s ease forwards;
}

.boot h1{
font-size:18px;
letter-spacing:4px;
}

.boot span{
color:#ff2b2b;
}

.boot p{
font-size:11px;
color:#777;
margin-top:8px;
}

@keyframes bootOut{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* PANEL */
.panel{
width:94%;
max-width:460px;
height:92vh;
background:rgba(15,15,15,.72);
border:1px solid rgba(255,0,0,.25);
border-radius:26px;
backdrop-filter:blur(18px);
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 80px rgba(255,0,0,.08);
animation:enter .6s ease;
}

@keyframes enter{
from{opacity:0;transform:scale(.96) translateY(20px)}
to{opacity:1;transform:scale(1) translateY(0)}
}

/* PHOTOS */
.photos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:12px;
}

.photos img{
width:100%;
height:110px;
border-radius:14px;
object-fit:cover;
border:1px solid rgba(255,255,255,.08);
transition:.25s;
}

.photos img:hover{
transform:scale(1.05);
}

/* HEADER */
.header{
margin:0 12px;
padding:14px;
border-radius:18px;
background:linear-gradient(180deg,#151515,#0e0e0e);
border:1px solid rgba(255,255,255,.06);
}

.title{
font-size:22px;
font-weight:900;
letter-spacing:3px;
}

.title span{color:#ff2b2b}

.desc{
font-size:12px;
color:#aaa;
margin-top:6px;
line-height:1.4;
}

/* NAV */
.tabs{
display:flex;
margin:10px 12px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.tab{
flex:1;
text-align:center;
padding:10px;
font-size:11px;
color:#777;
cursor:pointer;
position:relative;
transition:.2s;
}

.tab.active{color:#fff}

.tab.active::after{
content:"";
position:absolute;
bottom:-1px;
left:25%;
width:50%;
height:2px;
background:#ff2b2b;
border-radius:10px;
}

/* SCREENS (ultra smooth) */
.screen{
flex:1;
padding:12px;
opacity:0;
transform:translateX(30px) scale(.98);
pointer-events:none;
transition:.35s cubic-bezier(.2,.8,.2,1);
position:absolute;
width:100%;
}

.screen.active{
opacity:1;
transform:translateX(0) scale(1);
pointer-events:auto;
position:relative;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.btn{
height:52px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
background:linear-gradient(180deg,#151515,#101010);
color:#fff;
font-weight:800;
font-size:11px;
cursor:pointer;
transition:.2s;
position:relative;
overflow:hidden;
}

.btn:active{
transform:scale(.94);
}

.btn:hover{
border-color:rgba(255,0,0,.6);
box-shadow:0 10px 25px rgba(255,0,0,.12);
}

/* FOOTER */
.footer{
text-align:center;
padding:10px;
font-size:11px;
color:#666;
border-top:1px solid rgba(255,255,255,.06);
}

/* GLASS LIGHT */
.glow{
position:absolute;
width:600px;height:600px;
background:radial-gradient(circle,rgba(255,0,0,.12),transparent 65%);
filter:blur(90px);
top:-200px;
right:-200px;
animation:glow 16s infinite alternate ease-in-out;
}

@keyframes glow{
to{transform:translate(-260px,220px) scale(1.25);}
}
</style>
</head>

<body>

<div class="boot">
<h1>WORK <span>PANEL</span></h1>
<p>booting cyber ui system...</p>
</div>

<div class="glow"></div>

<div class="panel">

<div class="photos">
<img src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
<img src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
</div>

<div class="header">
<div class="title">WORK <span>PANEL</span></div>
<div class="desc">Ultra cyber control system. Smooth UI engine active.</div>
</div>

<div class="tabs">
<div class="tab active" onclick="go(0)">MENU</div>
<div class="tab" onclick="go(1)">INFO</div>
</div>

<!-- SCREENS -->
<div class="screen active">
<div class="grid">
<button class="btn">ПРОФИЛЬ</button>
<button class="btn">НАСТАВНИК</button>
<button class="btn">МАНУАЛ</button>
<button class="btn">ПАКИ</button>
<button class="btn">ГОЛОСОВЫЕ</button>
<button class="btn">ПАСТЫ</button>
<button class="btn">БОТЫ</button>
<button class="btn">ПРОБИВ</button>
</div>
</div>

<div class="screen">
<div style="font-size:12px;color:#aaa;line-height:1.6">
WORK PANEL v5 ULTRA<br><br>
Engine: cyber glass OS<br>
Render: smooth transition system<br>
UI level: premium interactive<br><br>
System fully optimized.
</div>
</div>

<div class="footer">Support team</div>

</div>

<script>
const tabs=document.querySelectorAll(".tab");
const screens=document.querySelectorAll(".screen");

function go(i){
tabs.forEach(t=>t.classList.remove("active"));
screens.forEach(s=>s.classList.remove("active"));

tabs[i].classList.add("active");
screens[i].classList.add("active");
}

/* button feedback */
document.querySelectorAll(".btn").forEach(b=>{
b.addEventListener("click",()=>{
b.animate([{transform:"scale(.94)"},{transform:"scale(1)"}],{duration:120});
});
});

/* parallax micro movement */
document.addEventListener("mousemove",(e)=>{
const x=(e.clientX/window.innerWidth-0.5)*8;
const y=(e.clientY/window.innerHeight-0.5)*8;
document.querySelector(".panel").style.transform=
`translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
