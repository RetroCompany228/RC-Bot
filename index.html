<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        body { 
            margin: 0; padding: 0;
            background: #050505; 
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden; /* Запрет прокрутки */
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Основной блок на весь экран */
        .main-frame {
            width: 100%; height: 100%;
            border: 3px solid rgba(255, 0, 0, 0.25); /* Полупрозрачная красная рамка */
            padding: 15px;
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .img-row { display: flex; gap: 10px; width: 100%; }
        .img-row img { width: 48%; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,0,0,0.3); }

        .work-panel { border: 1px solid rgba(255,0,0,0.3); border-radius: 20px; padding: 15px; text-align: center; }
        .title { color: #ff0000; font-size: 22px; text-transform: uppercase; margin: 0 0 10px 0; text-shadow: 0 0 10px #ff0000; }
        .desc { font-size: 13px; color: #ccc; }

        .nav-section { border: 1px solid rgba(255,0,0,0.3); border-radius: 20px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .nav-title { text-align: center; font-size: 13px; text-transform: uppercase; margin-bottom: 12px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 14px; border: 1px solid rgba(255,0,0,0.3); background: rgba(255,0,0,0.05); color: #fff; border-radius: 10px; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        .footer { text-align: center; font-size: 11px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="img-row">
            <img src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
            <img src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
        </div>

        <div class="work-panel">
            <div class="title">ВОРК ПАНЕЛЬ</div>
            <div class="desc">Новичок? Не знаешь с чего начать? Специально для тебя — Мы сделали Собственного Бота!</div>
        </div>

        <div class="nav-section">
            <div class="nav-title">НАВИГАЦИЯ</div>
            <div class="grid">
                <button class="btn">ПРОФИЛЬ</button><button class="btn">НАСТАВНИК</button>
                <button class="btn">МАНУАЛ</button><button class="btn">ПАКИ</button>
                <button class="btn">ГОЛОСОВЫЕ</button><button class="btn">ПАСТЫ</button>
                <button class="btn">БОТЫ</button><button class="btn">ПРОБИВ</button>
            </div>
        </div>

        <div class="footer">Поддержать Команду</div>
    </div>

</body>
</html>
