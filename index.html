<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --red: #ff0000;
            --border: 1px solid rgba(255, 255, 255, 0.15);
            /* Новая приглушенная рамка */
            --frame-color: #8b0000; 
        }

        body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 50%, #150505 0%, #050505 80%);
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden; /* Запрет любой прокрутки */
            display: flex; align-items: center; justify-content: center;
        }

        /* Статичная компактная рамка */
        .page-frame {
            width: 92%; max-width: 400px;
            max-height: 95vh;
            border: 2px solid var(--frame-color);
            border-radius: 25px;
            padding: 15px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 12px;
        }

        .curtain { position: fixed; top: 0; bottom: 0; width: 50%; background: #050505; z-index: 999; transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1); }
        .curtain-left { left: 0; }
        .curtain-right { right: 0; }
        .curtain-left.open { transform: translateX(-100%); }
        .curtain-right.open { transform: translateX(100%); }

        .container { display: flex; flex-direction: column; gap: 12px; height: 100%; }

        .photo-container { display: flex; justify-content: space-between; gap: 8px; }
        .photo { width: 48%; height: 70px; object-fit: cover; border-radius: 10px; border: var(--border); }

        .header-box { 
            border: var(--border); border-radius: 20px; padding: 12px; 
            background: rgba(255,255,255,0.02); text-align: center;
        }
        .title { text-transform: uppercase; letter-spacing: 2px; font-weight: 800; font-size: 20px; margin: 0 0 8px 0; color: #fff; text-shadow: 0 0 8px var(--red); }
        .desc { color: rgba(255,255,255,0.5); font-size: 11px; line-height: 1.3; margin: 0; }

        .nav-wrapper { border: var(--border); border-radius: 20px; padding: 12px; background: rgba(255,255,255,0.01); flex-grow: 1; }
        .nav-title { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 5px; text-transform: uppercase; }
        .arrow-down { text-align: center; color: var(--red); font-size: 16px; margin-bottom: 8px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn { 
            padding: 10px; border-radius: 8px; border: var(--border);
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 700; font-size: 10px;
            cursor: pointer; text-transform: uppercase;
        }

        .support-link { color: rgba(255,255,255,0.2); font-size: 10px; text-align: center; margin-top: auto; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="curtain curtain-left" id="cLeft"></div>
    <div class="curtain curtain-right" id="cRight"></div>

    <div class="page-frame">
        <div class="container">
            <div class="photo-container">
                <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
                <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
            </div>

            <div class="header-box">
                <h1 class="title">ВОРК ПАНЕЛЬ</h1>
                <p class="desc">Новичок?<br>Не знаешь с чего начать?<br>Специально для тебя - Мы сделали Собственного Бота!</p>
            </div>

            <div class="nav-wrapper">
                <h3 class="nav-title">НАВИГАЦИЯ</h3>
                <div class="arrow-down">▼</div>
                <div class="grid">
                    <button class="btn">ПРОФИЛЬ</button>
                    <button class="btn">НАСТАВНИК</button>
                    <button class="btn">МАНУАЛ</button>
                    <button class="btn">ПАКИ</button>
                    <button class="btn">ГОЛОСОВЫЕ</button>
                    <button class="btn">ПАСТЫ</button>
                    <button class="btn">БОТЫ</button>
                    <button class="btn">ПРОБИВ</button>
                </div>
            </div>

            <a href="#" class="support-link">Поддержать Команду</a>
        </div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('cLeft').classList.add('open');
                document.getElementById('cRight').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
