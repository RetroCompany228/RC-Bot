<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Company Terminal</title>
    <style>
        /* ГЛОБАЛЬНЫЕ НАСТРОЙКИ СТИЛЯ */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-red: #b30000;
            --text-main: #ffffff;
            --border-style: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* АНИМАЦИЯ ЭКРАНОВ */
        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* КАРТОЧКИ И СТЕКЛО */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: var(--border-style);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* СЕТКА НАВИГАЦИИ */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        /* КНОПКИ */
        .btn {
            padding: 20px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: var(--border-style);
            color: var(--text-main);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.1); }
        .btn:active { transform: scale(0.95); background: var(--accent-red); }

        /* ЗАГОЛОВКИ */
        h1, h2, h3 {
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <!-- ЗАГРУЗЧИК -->
    <div id="loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #050505; z-index: 9999;">
        Инициализация...
    </div>

    <main>
        <!-- ГЛАВНЫЙ ЭКРАН -->
        <section id="home" class="screen active">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <img style="width: 50%; height: 140px; object-fit: cover; border-radius: 20px;" src="https://i.postimg.cc/jdg86qFM/file-00000000b030720aaf369c9199102af4.png">
                <img style="width: 50%; height: 140px; object-fit: cover; border-radius: 20px;" src="https://i.postimg.cc/2ysgDXk7/file-00000000ffb472469d85c9cb6e6ee6f3.png">
            </div>

            <div class="card">
                <h1>ПАНЕЛЬ</h1>
                <p style="opacity: 0.6;">Не знаешь с чего начать?</p>
                <a href="https://t.me/RetroWork_Bot" style="color: var(--accent-red); font-weight: bold; text-decoration: none;">ВИДЕО ОБУЧЕНИЕ</a>
            </div>

            <h3 style="text-align: center; margin-top: 40px;">НАВИГАЦИЯ</h3>
            <div class="menu-grid">
                <button class="btn" onclick="loadScreen('profile')">ПРОФИЛЬ</button>
                <button class="btn" onclick="loadScreen('mentors')">НАСТАВНИК</button>
                <button class="btn" onclick="loadScreen('manuals')">МАНУАЛ</button>
                <button class="btn" onclick="loadScreen('packs')">ПАКИ</button>
                <button class="btn" onclick="loadScreen('voice')">ГОЛОСОВЫЕ</button>
                <button class="btn" onclick="loadScreen('pastes')">ПАСТЫ</button>
            </div>
        </section>

        <!-- РАЗДЕЛЫ -->
        <section id="profile" class="screen">
            <div class="card">
                <h2>ПРОФИЛЬ</h2>
                <button class="btn" onclick="loadScreen('home')">НАЗАД</button>
            </div>
        </section>
        <section id="mentors" class="screen">
            <div class="card">
                <h2>НАСТАВНИК</h2>
                <button class="btn" onclick="loadScreen('home')">НАЗАД</button>
            </div>
        </section>
        <section id="manuals" class="screen">
            <div class="card">
                <h2>МАНУАЛ</h2>
                <button class="btn" onclick="loadScreen('home')">НАЗАД</button>
            </div>
        </section>
    </main>

    <script>
        // ЛОГИКА ЗАГРУЗКИ
        window.addEventListener('load', () => {
            document.getElementById('loader').style.display = 'none';
        });

        // ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
        function loadScreen(targetId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(targetId).classList.add('active');
        }
    </script>
</body>
</html>
