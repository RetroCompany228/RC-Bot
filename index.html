<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --bg-dark: #050505;
            --red: #ff0000;
            --glass: rgba(255, 255, 255, 0.04);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 0%, #1a0000 0%, transparent 60%),
                        radial-gradient(circle at 50% 100%, #1a0000 0%, transparent 60%),
                        radial-gradient(circle at 50% 50%, #080505 0%, #050505 70%);
            background-color: #050505;
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            user-select: none;
        }

        /* Шторки */
        .curtain {
            position: fixed; top: 0; bottom: 0; width: 50%;
            background: #050505; z-index: 999;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .curtain-left { left: 0; border-right: 1px solid rgba(255, 0, 0, 0.5); }
        .curtain-right { right: 0; border-left: 1px solid rgba(255, 0, 0, 0.5); }
        .curtain-left.open { transform: translateX(-100%); }
        .curtain-right.open { transform: translateX(100%); }

        /* Анимации */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(255,0,0,0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,0,0,0.4); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,0,0,0.2); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .container { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; margin-top: 10px; }
        
        .btn { 
            padding: 20px 10px; border-radius: 14px; 
            background: rgba(255,255,255,0.03); 
            color: #fff; font-weight: 900; font-size: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            border: var(--border);
            animation: pulse 3s infinite;
        }

        .title { text-align: center; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; font-size: 26px; margin: 20px 0; text-shadow: 0 0 10px var(--red); }
        .nav-title { text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 16px; margin-top: 20px; color: rgba(255,255,255,0.5); }
        .arrow-down { text-align: center; color: var(--red); font-size: 24px; margin: 5px 0; animation: bounce 2s infinite; }
        
        .photo-container { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .photo { width: 48%; height: 100px; object-fit: cover; border-radius: 14px; border: var(--border); }
        
        .screen { display: none; height: 100%; }
        .screen.active { display: flex; flex-direction: column; }
        .support-link { color: rgba(255,255,255,0.2); font-size: 12px; text-decoration: underline; text-align: center; margin-top: auto; padding: 20px; }
    </style>
</head>
<body>

    <div class="curtain curtain-left" id="cLeft"></div>
    <div class="curtain curtain-right" id="cRight"></div>

    <div id="home" class="screen active container">
        <div class="photo-container">
            <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
            <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
        </div>

        <h1 class="title">ВОРК ПАНЕЛЬ</h1>

        <h3 class="nav-title">ВЫБЕРИТЕ РАЗДЕЛ</h3>
        <div class="arrow-down">▼</div>
        
        <div class="grid">
            <button class="btn" onclick="loadScreen('profile')">ПРОФИЛЬ</button>
            <button class="btn" onclick="loadScreen('mentors')">НАСТАВНИК</button>
            <button class="btn" onclick="loadScreen('manuals')">МАНУАЛ</button>
            <button class="btn" onclick="loadScreen('packs')">ПАКИ</button>
            <button class="btn" onclick="loadScreen('voice')">ГОЛОСОВЫЕ</button>
            <button class="btn" onclick="loadScreen('pastes')">ПАСТЫ</button>
            <button class="btn" onclick="loadScreen('bots')">БОТЫ</button>
            <button class="btn" onclick="loadScreen('dox')">ПРОБИВ</button>
        </div>

        <a href="http://t.me/send?start=IVP6IT4GmUuc" class="support-link">Поддержать Команду</a>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('cLeft').classList.add('open');
                document.getElementById('cRight').classList.add('open');
            }, 2000);
        };

        function loadScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }
    </script>
</body>
</html>
