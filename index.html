<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        .profile-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #ff0000;
            padding: 20px;
            border-radius: 20px;
            width: 85%;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        #user-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 10px;
        }
        .btn {
            background: #111;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 15px;
            width: 90%;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:active { background: #ff0000; color: #fff; }
    </style>
</head>
<body>

<div class="profile-card">
    <img id="user-photo" src="https://via.placeholder.com/150" alt="Avatar">
    <h2 id="user-name">Загрузка...</h2>
    <p style="font-size: 12px; color: #777;" id="user-id">ID: ---</p>
</div>

<button class="btn">🩸 ЛИЧНОЕ ДЕЛО</button>
<button class="btn">🔥 ВЫПЛАТЫ</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Получаем данные пользователя
    if (tg.initDataUnsafe.user) {
        let user = tg.initDataUnsafe.user;
        document.getElementById('user-name').innerText = user.first_name;
        document.getElementById('user-id').innerText = "ID: " + user.id;
        
        // В Telegram Mini App нельзя напрямую получить URL фото, 
        // поэтому обычно используют фото из профиля через бота, 
        // но для начала мы выведем имя.
    }
</script>
</body>
</html>
