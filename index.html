<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Company Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Глубокий, «дорогой» фон */
        body {
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }

        /* Баннер с «элитной» обводкой */
        .banner { 
            width: 100%; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); margin-bottom: 25px; 
        }

        /* Карточки «Стекло» */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Премиум кнопки */
        .btn {
            display: block; width: 100%; padding: 16px; margin: 12px 0;
            background: linear-gradient(90deg, #d40000, #8b0000);
            border: none; border-radius: 14px; color: white;
            font-weight: 700; font-size: 15px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center; text-decoration: none;
        }
        .btn:active { transform: scale(0.96); box-shadow: 0 0 20px rgba(212, 0, 0, 0.5); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="home" class="screen active">
            <img src="https://i.postimg.cc/jdg86qFM/file-00000000b030720aaf369c9199102af4.png" class="banner">
            <div class="glass-card">
                <p style="font-size: 14px; line-height: 1.6; color: #ccc;">
                    RetroBot — авторизованный терминал. 
                    Войдите в профиль, чтобы начать работу с наставником и перейти к финансовым операциям.
                </p>
            </div>
            <button class="btn" onclick="showScreen('profile')">МОЙ ПРОФИЛЬ</button>
        </div>

        <div id="profile" class="screen">
            <h3 style="text-align:center; margin-bottom: 25px; letter-spacing: 2px;">РАБОЧИЙ КАБИНЕТ</h3>
            <button class="btn" onclick="showScreen('mentors')">ВЫБРАТЬ НАСТАВНИКА</button>
            <button class="btn btn-secondary">СТАТИСТИКА</button>
            <button class="btn btn-secondary">МАНУАЛЫ</button>
            <button class="btn" style="background: transparent; border: 1px solid #444;" onclick="showScreen('home')">НАЗАД</button>
        </div>

        <div id="mentors" class="screen">
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap: 15px;">
                    <img src="https://i.postimg.cc/4d7VpZjx/file-00000000e62471f4abcd57f082e86de9.png" style="width:60px; height:60px; border-radius:12px;">
                    <div>
                        <h4 style="margin:0;">KODI</h4>
                        <a href="https://t.me/bicuze" class="btn" style="margin: 10px 0 0 0; padding: 10px;">НАПИСАТЬ</a>
                    </div>
                </div>
            </div>
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap: 15px;">
                    <img src="https://i.postimg.cc/NGXRMs1S/file-00000000b860720aa3ee358794aca807.png" style="width:60px; height:60px; border-radius:12px;">
                    <div>
                        <h4 style="margin:0;">RELAX</h4>
                        <a href="https://t.me/coxiko" class="btn" style="margin: 10px 0 0 0; padding: 10px;">НАПИСАТЬ</a>
                    </div>
                </div>
            </div>
            <button class="btn" style="background: transparent; border: 1px solid #444;" onclick="showScreen('profile')">НАЗАД</button>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.expand();
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
