<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Panel v6 Final</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
background:#0a0a0a;
}

/* 🔴 PREMIUM RED iOS BACKGROUND */
body::before{
content:"";
position:absolute;
inset:-200px;
background:
radial-gradient(circle at 20% 20%, rgba(255,40,60,.35), transparent 45%),
radial-gradient(circle at 80% 30%, rgba(140,0,40,.25), transparent 50%),
radial-gradient(circle at 50% 80%, rgba(255,0,0,.15), transparent 55%);
filter:blur(70px);
animation:bg 14s ease-in-out infinite alternate;
}

@keyframes bg{
to{transform:translate(120px,90px) scale(1.08);}
}

/* 📱 MAIN GLASS APP */
.app{
width:95%;
max-width:460px;
height:92vh;
border-radius:34px;
overflow:hidden;

background:rgba(255,255,255,.06);
backdrop-filter:blur(28px);

border:1px solid rgba(255,255,255,.10);
box-shadow:0 30px 80px rgba(0,0,0,.6);

display:flex;
flex-direction:column;

animation:open .6s ease;
}

@keyframes open{
from{transform:scale(.94);opacity:0}
to{transform:scale(1);opacity:1}
}

/* 🖼 TOP IMAGES */
.top{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:14px;
}

.top img{
width:100%;
height:120px;
border-radius:18px;
object-fit:cover;
transition:.25s;
}

.top img:hover{
transform:scale(1.02);
}

/* 🧊 GLASS CARD */
.card{
margin:0 14px;
padding:16px;
border-radius:24px;

background:rgba(255,255,255,.07);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);
}

.title{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

.title span{
color:#ff3b4d;
}

.desc{
font-size:12px;
color:rgba(255,255,255,.65);
margin-top:6px;
line-height:1.4;
}

/* 🧭 TABS */
.tabs{
margin:12px 14px;
display:flex;

background:rgba(255,255,255,.06);
border-radius:16px;
padding:4px;
}

.tab{
flex:1;
text-align:center;
padding:9px;
font-size:11px;
color:rgba(255,255,255,.55);
cursor:pointer;

border-radius:12px;
transition:.25s;

-webkit-tap-highlight-color:transparent;
user-select:none;
}

.tab.active{
background:rgba(255,255,255,.12);
color:#fff;
}

/* 📄 PAGE */
.page{
flex:1;
padding:14px;
display:none;
animation:fade .35s ease;
}

.page.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

/* 🔘 BUTTON GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
padding:14px;
border-radius:18px;

background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.10);

color:#fff;
font-size:11px;
font-weight:700;

cursor:pointer;
transition:.2s;

-webkit-tap-highlight-color:transparent;
outline:none; /* ❗ убирает синий фокус */
}

.btn:focus{
outline:none;
box-shadow:none;
}

.btn:active{
transform:scale(.96);
}

.btn:hover{
background:rgba(255,255,255,.10);
border-color:rgba(255,60,80,.35);
}

/* footer */
.footer{
text-align:center;
padding:12px;
font-size:11px;
color:rgba(255,255,255,.4);
border-top:1px solid rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
<img src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
</div>

<div class="card">
<div class="title">WORK <span>PANEL</span></div>
<div class="desc">Premium glass interface system. Smooth iOS-level UI experience.</div>
</div>

<div class="tabs">
<div class="tab active" onclick="go(0)">MENU</div>
<div class="tab" onclick="go(1)">INFO</div>
</div>

<div class="page active">
<div class="grid">
<button class="btn">ПРОФИЛЬ</button>
<button class="btn">НАСТАВНИК</button>
<button class="btn">МАНУАЛ</button>
<button class="btn">ПАКИ</button>
<button class="btn">ГОЛОСОВЫЕ</button>
<button class="btn">ПАСТЫ</button>
<button class="btn">БОТЫ</button>
<button class="btn">ПРОБИВ</button>
</div>
</div>

<div class="page">
<div style="font-size:12px;color:rgba(255,255,255,.65);line-height:1.6">
WORK PANEL v6 FINAL<br><br>
✔ Glass UI optimized<br>
✔ Red gradient background<br>
✔ iOS-style interactions<br>
✔ Smooth animations engine<br><br>
Status: PREMIUM BUILD
</div>
</div>

<div class="footer">Cyber Glass System</div>

</div>

<script>
const tabs=document.querySelectorAll(".tab");
const pages=document.querySelectorAll(".page");

function go(i){
tabs.forEach(t=>t.classList.remove("active"));
pages.forEach(p=>p.classList.remove("active"));

tabs[i].classList.add("active");
pages[i].classList.add("active");
}

/* click feel */
document.querySelectorAll(".btn").forEach(b=>{
b.addEventListener("click",()=>{
b.animate(
[{transform:"scale(.95)"},{transform:"scale(1)"}],
{duration:120}
);
});
});
</script>

</body>
</html>
