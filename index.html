<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ворк-Панель</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap');
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat', sans-serif;
        }
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:#020000;
            color:#fff;
        }

        /* BACKGROUND GLOW */
        body::before{
            content:"";
            position:absolute;
            inset:-300px;
            background:
            radial-gradient(circle at 20% 20%, rgba(255,0,60,.25), transparent 50%),
            radial-gradient(circle at 70% 30%, rgba(120,0,20,.45), transparent 55%),
            radial-gradient(circle at 50% 80%, rgba(255,0,0,.12), transparent 60%);
            filter:blur(90px);
            animation:bg 18s ease-in-out infinite alternate;
        }

        @keyframes bg{
            to{transform:translate(140px,100px) scale(1.15);}
        }

        /* PARTICLES */
        canvas{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:0;
            pointer-events:none;
        }

        /* APP */
        .app{
            position:relative;
            z-index:2;
            width:95%;
            max-width:460px;
            height:92vh;
            border-radius:36px;
            background:rgba(255,255,255,.06);
            backdrop-filter:blur(35px);
            border:1px solid rgba(255,80,80,.15);
            box-shadow:
            0 40px 120px rgba(0,0,0,.85),
            inset 0 0 80px rgba(255,0,0,.08);
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .top-wrap{padding:14px;}
        .top-frame{
            padding:12px;
            border-radius:24px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,80,80,.25);
            backdrop-filter:blur(20px);
        }

        .top-frame img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:18px;
            display:block;
        }

        .title-box{
            margin:0 14px;
            padding:18px;
            border-radius:26px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.12);
            backdrop-filter:blur(30px);
        }

        .title{
            font-size:24px;
            font-weight:900;
            letter-spacing:2px;
        }

        .title span{color:#ff2b3d;}

        .desc{
            margin-top:8px;
            font-size:12px;
            line-height:1.6;
            color:rgba(255,255,255,.75);
        }

        .tabs{
            margin:12px 14px;
            display:flex;
            gap:6px;
            padding:5px;
            border-radius:18px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,80,80,.15);
            backdrop-filter:blur(20px);
        }

        .tab{
            flex:1;
            text-align:center;
            padding:10px;
            border-radius:14px;
            font-size:12px;
            font-weight:700;
            color:rgba(255,255,255,.6);
            cursor:pointer;
            transition:.25s;
        }

        .tab.active{
            background:rgba(255,255,255,.12);
            color:#fff;
            box-shadow:0 0 20px rgba(255,0,60,.25);
        }

        .page{
            flex:1;
            padding:14px;
            display:none;
        }

        .page.active{display:block;}

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }

        .btn{
            padding:16px;
            border-radius:22px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,80,80,.25);
            backdrop-filter:blur(25px);
            color:#fff;
            font-size:12px;
            font-weight:900;
            letter-spacing:1.2px;
            cursor:pointer;
            transition:.25s;
            box-shadow: 0 0 10px rgba(255,0,60,.15), inset 0 0 10px rgba(255,255,255,.05);
            text-shadow: 0 0 6px rgba(255,0,60,.6), 0 0 12px rgba(255,0,60,.35);
        }

        .btn:hover{
            transform:translateY(-3px);
            border-color:rgba(255,60,60,.5);
            box-shadow: 0 0 25px rgba(255,0,60,.35), 0 0 45px rgba(255,0,60,.15), inset 0 0 10px rgba(255,255,255,.08);
            text-shadow: 0 0 10px rgba(255,80,80,.9), 0 0 20px rgba(255,0,60,.7);
        }

        /* UPDATED FOOTER */
        .footer{
            text-align:center;
            padding:20px 12px 25px 12px; /* Увеличили отступ снизу */
            font-size:14px;
            font-weight:700;
            color:#ff2b3d; /* Цвет из заголовка */
            cursor:pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: .3s;
        }
        .footer:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="app">
        <div class="top-wrap">
            <div class="top-frame">
                <img src="https://i.postimg.cc/43DYTgKF/Screenshot-2026-06-28-17-05-20-070-com-openai-chatgpt-edit.jpg" alt="Главное изображение">
            </div>
        </div>

        <div class="title-box">
            <div class="title">ВОРК - <span>ПАНЕЛЬ</span></div>
            <div class="desc">Киберпанк интерфейс с неоном и стеклом</div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="go(0)">МЕНЮ</div>
            <div class="tab" onclick="go(1)">ИНФО</div>
        </div>

        <div class="page active">
            <div class="grid">
                <button class="btn">ПРОФИЛЬ</button>
                <button class="btn">НАСТАВНИК</button>
                <button class="btn">МАНУАЛ</button>
                <button class="btn">ПАКИ</button>
                <button class="btn">ГОЛОСОВЫЕ</button>
                <button class="btn">БОТЫ</button>
                <button class="btn">ПАСТЫ</button>
                <button class="btn">ПРОБИВ</button>
            </div>
        </div>

        <div class="page">
            <div style="font-size:12px;line-height:1.6;color:rgba(255,255,255,.75)">
                Версия: ULTRA CYBER v7<br>
                Glass + Neon UI Engine<br>
            </div>
        </div>

        <div class="footer">ПОДДЕРЖАТЬ КОМАНДУ</div>
    </div>

    <script>
        function go(i){
            document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
            document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
            document.querySelectorAll(".tab")[i].classList.add("active");
            document.querySelectorAll(".page")[i].classList.add("active");
        }
        /* PARTICLES */
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = ["rgba(255,0,60,.85)", "rgba(255,255,255,.85)", "rgba(0,0,0,.6)"];
        const particles = [];

        for(let i=0;i<200;i++){
            particles.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                size:Math.random()*4.8+1.5,
                speed:Math.random()*3+1.5,
                color:colors[Math.floor(Math.random()*colors.length)],
                drift:Math.random()*1.4-0.7
            });
        }

        function animate(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let p of particles){
                p.y += p.speed;
                p.x += p.drift;
                if(p.y > canvas.height){
                    p.y = -10;
                    p.x = Math.random()*canvas.width;
                }
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 18;
                ctx.shadowColor = p.color;
                ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener("resize",()=>{
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
