<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Company Terminal</title>
    <style>
        body { margin: 0; background-color: #050505; color: #fff; font-family: sans-serif; }
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }
        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #050505; z-index: 9999; }
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(90deg, #b30000, #5a0000); color: #fff; font-weight: 700; margin-bottom: 10px; cursor: pointer; text-decoration: none; text-align: center; }
        .card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="loader">Загрузка...</div>

    <div id="home" class="screen active">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <img style="width: 50%; height: 140px; object-fit: cover; border-radius: 18px;" src="https://i.postimg.cc/jdg86qFM/file-00000000b030720aaf369c9199102af4.png">
            <img style="width: 50%; height: 140px; object-fit: cover; border-radius: 18px;" src="https://i.postimg.cc/2ysgDXk7/file-00000000ffb472469d85c9cb6e6ee6f3.png">
        </div>

        <div class="card">
            <h2 style="font-weight: 900; letter-spacing: 2px; font-size: 28px; text-transform: uppercase; margin: 0 0 10px;">ПАНЕЛЬ</h2>
            <p style="opacity: 0.6; margin-bottom: 15px;">Не знаешь с чего начать?</p>
            <p style="opacity: 0.6;">Специально для вас мы создали <br>
            <a href="https://t.me/RetroWork_Bot" style="color: #ff0000; font-weight: 800;">видео обучение</a> @RetroWork_Bot!</p>
        </div>

        <h3 style="text-align: center; margin-top: 25px;">НАВИГАЦИЯ</h3>
        <button class="btn" onclick="loadScreen('profile')">Профиль</button>
        <button class="btn" onclick="loadScreen('mentors')">Наставник</button>
        <button class="btn" onclick="loadScreen('manuals')">Мануал</button>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="#" style="color: rgba(255,255,255,0.3); font-size: 12px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1);">Поддержать Команду</a>
        </div>
    </div>

    <script>
        window.onload = () => { document.getElementById('loader').style.display = 'none'; };
        function loadScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
