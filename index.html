<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
color:#fff;
}

.panel{
width:92%;
max-width:420px;
background:#0d0d0d;
border:1px solid rgba(255,0,0,.25);
border-radius:20px;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

.photos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.photos img{
width:100%;
height:110px;
object-fit:cover;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
}

.header{
padding:14px;
background:#111;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
}

.title{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

.title span{color:#ff2b2b}

.desc{
font-size:12px;
color:#aaa;
margin-top:6px;
line-height:1.4;
}

.menu-title{
text-align:center;
font-size:12px;
color:#777;
letter-spacing:3px;
margin-top:6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.btn{
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
background:#111;
color:#fff;
font-weight:700;
font-size:11px;
cursor:pointer;
transition:.2s;
}

.btn:hover{
border-color:#ff2b2b;
transform:translateY(-2px);
}

.footer{
text-align:center;
font-size:11px;
color:#666;
margin-top:4px;
}

.footer a{
color:#ff2b2b;
text-decoration:none;
}
</style>
</head>

<body>

<div class="panel">

<div class="photos">
<img src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
<img src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
</div>

<div class="header">
<div class="title">WORK <span>PANEL</span></div>
<div class="desc">Быстрый доступ к инструментам команды и материалам.</div>
</div>

<div class="menu-title">НАВИГАЦИЯ</div>

<div class="grid">
<button class="btn">ПРОФИЛЬ</button>
<button class="btn">НАСТАВНИК</button>
<button class="btn">МАНУАЛ</button>
<button class="btn">ПАКИ</button>
<button class="btn">ГОЛОСОВЫЕ</button>
<button class="btn">ПАСТЫ</button>
<button class="btn">БОТЫ</button>
<button class="btn">ПРОБИВ</button>
</div>

<div class="footer">
<a href="#">Поддержать команду</a>
</div>

</div>

<script>
document.querySelectorAll(".btn").forEach(b=>{
b.onclick=()=>b.style.transform="scale(.96)";
});
</script>

</body>
</html>
