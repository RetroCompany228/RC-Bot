<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВОРК-ПАНЕЛЬ</title>
    <style>
        :root {
            --neon-red: #ff003c;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Частицы */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* Основной контейнер */
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }

        .banner {
            width: 100%; height: 200px; border-radius: 20px; object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Эффект Стекла */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        p { font-size: 14px; opacity: 0.8; line-height: 1.4; }

        /* Кнопки */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--neon-red);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        .menu-btn:active { transform: scale(0.95); background: var(--neon-red); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <img src="https://picsum.photos/600/300" class="banner" alt="Banner">

        <div class="glass-card">
            <h1>ВОРК — ПАНЕЛЬ</h1>
            <p>Новичок?<br>Не знаешь с чего начать?</p>
            <p style="margin-top: 10px;">Специально для тебя и нашей команды мы сделали собственную ворк-панель.</p>
        </div>

        <div class="btn-grid">
            <button class="menu-btn" onclick="alert('Профиль')">ПРОФИЛЬ</button>
            <button class="menu-btn" onclick="alert('Наставник')">НАСТАВНИК</button>
            <button class="menu-btn" onclick="alert('Мануал')">МАНУАЛ</button>
            <button class="menu-btn" onclick="alert('Паки')">ПАКИ</button>
            <button class="menu-btn" onclick="alert('Голосовые')">ГОЛОСОВЫЕ</button>
            <button class="menu-btn" onclick="alert('Пасты')">ПАСТЫ</button>
            <button class="menu-btn" onclick="alert('Боты')">БОТЫ</button>
            <button class="menu-btn" onclick="alert('Пробив')">ПРОБИВ</button>
        </div>
    </div>

    <script>
        // Анимация частиц
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2 });
        }

        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 0, 60, 0.2)';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                p.y += 0.2;
                if(p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
