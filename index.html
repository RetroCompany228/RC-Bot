<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal</title>
    <style>
        :root {
            --bg-dark: #050505;
            --red-btn: #800000;
            --glass: rgba(0, 0, 0, 0.6); /* Сделал фон карточек чуть темнее для читаемости */
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background-color: #000;
            font-family: sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: none;
        }

        /* Фоновый слой */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/jdg86qFM/file-00000000b030720aaf369c9199102af4.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3); /* Затемняем картинку, чтобы текст был виден */
            z-index: -1;
        }
        
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: var(--border); border-radius: 24px; padding: 20px; margin: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 15px; }
        
        .btn { 
            padding: 12px 10px; border-radius: 16px; border: var(--border); 
            background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; 
            cursor: pointer; transition: transform 0.1s ease-out;
            display: flex; align-items: center; gap: 10px;
        }
        .btn:active { transform: scale(0.90); background: var(--red-btn); }
        
        .btn img { 
            width: 28px; height: 28px; object-fit: cover; 
            border-radius: 8px; background: #000; padding: 2px;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }

        .screen { display: none; height: 100vh; overflow-y: auto; }
        .screen.active { display: block; }

        .support-link { color: rgba(255,255,255,0.3); text-decoration: underline; display: block; text-align: center; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="bg-img"></div> <div id="home" class="screen active">
        <div style="height: 20px;"></div> <div class="glass-card" style="text-align: center;">
            <h1 style="color: #fff; margin: 0;">ПАНЕЛЬ</h1>
            <a href="https://t.me/RetroWork_Bot" style="color: #ff0000; text-decoration: none;">ВИДЕО ОБУЧЕНИЕ</a>
        </div>

        <div class="grid">
            <button class="btn" onclick="loadScreen('profile')"><img src="https://i.postimg.cc/k4my6qSK/file-00000000d388720aa63b4011116f397d.png"> ПРОФИЛЬ</button>
            <button class="btn" onclick="loadScreen('mentors')"><img src="https://i.postimg.cc/TPrVXFsx/file-00000000d02c720aa096c2c068ff09be.png"> НАСТАВНИК</button>
            </div>
        <a href="http://t.me/send?start=IVP6IT4GmUuc" class="support-link">Поддержать Команду</a>
    </div>
    
    <script>
        function loadScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
