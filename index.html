<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Terminal</title>
    <style>
        :root {
            --red: #ff0000;
            --border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; padding: 0;
            /* Анимированный фон: переливающийся неон */
            background: linear-gradient(180deg, #050505 0%, #200000 50%, #050505 100%);
            background-size: 100% 300%;
            animation: moveGradient 8s linear infinite;
            color: #fff; font-family: sans-serif; 
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        .page-frame {
            width: 94%; height: 94vh;
            border: 2px solid rgba(255, 0, 0, 0.3); 
            border-radius: 30px;
            padding: 15px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4); /* Чуть затемним подложку, чтобы неон смотрелся лучше */
        }

        .curtain { position: fixed; top: 0; bottom: 0; width: 50%; background: #050505; z-index: 999; transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1); }
        .curtain-left { left: 0; }
        .curtain-right { right: 0; }
        .curtain-left.open { transform: translateX(-100%); }
        .curtain-right.open { transform: translateX(100%); }

        .container { display: flex; flex-direction: column; gap: 10px; height: 100%; justify-content: space-between; }

        .photo-container { display: flex; justify-content: space-between; gap: 10px; flex-shrink: 0; }
        .photo { width: 48%; height: 80px; object-fit: cover; border-radius: 14px; border: var(--border); }

        .header-box { 
            border: var(--border); border-radius: 20px; padding: 15px; 
            background: rgba(255,255,255,0.02); text-align: center; flex-shrink: 0;
        }
        .title { text-transform: uppercase; letter-spacing: 2px; font-weight: 900; font-size: 20px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px var(--red); }
        .desc { color: rgba(255,255,255,0.5); font-size: 12px; line-height: 1.3; margin: 0; }

        .nav-wrapper { border: var(--border); border-radius: 20px; padding: 15px; background: rgba(255,255,255,0.01); display: flex; flex-direction: column; flex-grow: 1; justify-content: start; min-height: 0; }
        
        .nav-title { text-align: center; font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        .arrow-down { 
            text-align: center; color: var(--red); font-size: 22px; margin-bottom: 12px; 
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            padding: 16px; border-radius: 12px; border: var(--border);
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 800; font-size: 12px;
            cursor: pointer; text-transform: uppercase;
        }

        .support-link { color: rgba(255,255,255,0.2); font-size: 12px; text-align: center; text-decoration: underline; flex-shrink: 0; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="curtain curtain-left" id="cLeft"></div>
    <div class="curtain curtain-right" id="cRight"></div>

    <div class="page-frame">
        <div class="container">
            <div class="photo-container">
                <img class="photo" src="https://i.postimg.cc/VNZ5bFpK/file-000000005e0c71f4a49a7f49860f470b.png">
                <img class="photo" src="https://i.postimg.cc/bJvb7rf8/file-00000000141471f4830c3f69348be825.png">
            </div>

            <div class="header-box">
                <h1 class="title">ВОРК ПАНЕЛЬ</h1>
                <p class="desc">Новичок?<br>Не знаешь с чего начать?<br>Специально для тебя, и для нашей Команды - Мы сделали Собственного Бота!</p>
            </div>

            <div class="nav-wrapper">
                <h3 class="nav-title">НАВИГАЦИЯ</h3>
                <div class="arrow-down">▼</div>
                <div class="grid">
                    <button class="btn">ПРОФИЛЬ</button>
                    <button class="btn">НАСТАВНИК</button>
                    <button class="btn">МАНУАЛ</button>
                    <button class="btn">ПАКИ</button>
                    <button class="btn">ГОЛОСОВЫЕ</button>
                    <button class="btn">ПАСТЫ</button>
                    <button class="btn">БОТЫ</button>
                    <button class="btn">ПРОБИВ</button>
                </div>
            </div>

            <a href="#" class="support-link">Поддержать Команду</a>
        </div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('cLeft').classList.add('open');
                document.getElementById('cRight').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
